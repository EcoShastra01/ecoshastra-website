<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eco Shastra — The Economics Society | Sri Aurobindo College (Evening)</title>
<meta name="description" content="Eco Shastra is the official Economics Society of Sri Aurobindo College (Evening), University of Delhi — exploring economics, creating opportunities, building leaders.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
/* ============ TOKENS ============ */
:root{
  --navy:#0F172A;
  --navy-2:#1E293B;
  --navy-soft:#334155;
  --cyan:#06B6D4;
  --cyan-light:#22D3EE;
  --cyan-dim:rgba(6,182,212,0.12);
  --white:#FFFFFF;
  --off-white:#F8FAFC;
  --paper:#F1F5F9;
  --slate:#475569;
  --slate-light:#94A3B8;
  --border:rgba(15,23,42,0.09);
  --border-strong:rgba(15,23,42,0.14);
  --shadow-sm: 0 2px 10px rgba(15,23,42,0.06);
  --shadow-md: 0 10px 30px rgba(15,23,42,0.08);
  --shadow-lg: 0 25px 60px rgba(15,23,42,0.12);
  --shadow-cyan: 0 15px 40px rgba(6,182,212,0.25);
  --radius: 20px;
  --radius-sm: 12px;
  --ease: cubic-bezier(.16,1,.3,1);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  color:var(--navy);
  background:var(--white);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block;}
a{text-decoration:none;color:inherit;}
ul{list-style:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
::selection{background:var(--cyan); color:var(--white);}

.eyebrow{
  font-family:'JetBrains Mono',monospace;
  font-size:0.72rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--cyan);
  font-weight:500;
  display:inline-flex;
  align-items:center;
  gap:8px;
}
.eyebrow::before{
  content:'';
  width:7px;height:7px;border-radius:50%;
  background:var(--cyan);
  box-shadow:0 0 0 4px var(--cyan-dim);
}
h1,h2,h3,h4{font-family:'Sora',sans-serif; color:var(--navy); line-height:1.15;}
.section-head{max-width:680px; margin-bottom:56px;}
.section-head h2{font-size:clamp(1.9rem,4vw,2.8rem); font-weight:700; margin-top:10px; letter-spacing:-0.01em;}
.section-head p{color:var(--slate); font-size:1.05rem; margin-top:14px; line-height:1.7;}
.section-head.center{margin-left:auto;margin-right:auto;text-align:center;}

.wrap{max-width:1180px; margin:0 auto; padding:0 24px;}
section{padding:110px 0; position:relative;}
.bg-alt{background:var(--off-white);}

.btn{
  display:inline-flex; align-items:center; gap:10px;
  padding:15px 30px; border-radius:50px;
  font-weight:600; font-size:0.95rem;
  font-family:'Inter',sans-serif;
  transition:all .4s var(--ease);
  white-space:nowrap;
}
.btn-primary{
  background:var(--navy); color:var(--white);
  box-shadow:var(--shadow-md);
}
.btn-primary:hover{ background:var(--cyan); transform:translateY(-3px); box-shadow:var(--shadow-cyan);}
.btn-ghost{
  background:transparent; color:var(--navy); border:1.5px solid var(--border-strong);
}
.btn-ghost:hover{ border-color:var(--cyan); color:var(--cyan); transform:translateY(-3px); background:var(--cyan-dim);}

/* ============ GLASS CARD ============ */
.glass{
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.6);
  box-shadow:var(--shadow-md);
  border-radius:var(--radius);
}

/* ============ REVEAL ANIM ============ */
.reveal{ opacity:0; transform:translateY(34px); transition:opacity .8s var(--ease), transform .8s var(--ease); }
.reveal.active{ opacity:1; transform:translateY(0); }
.reveal-stagger > *{ transition-delay:calc(var(--i) * 0.08s); }

/* ============ NAVBAR ============ */
.navbar{
  position:fixed; top:0; left:0; width:100%; z-index:1000;
  padding:18px 0;
  transition:all .45s var(--ease);
}
.navbar.scrolled{
  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  box-shadow:0 2px 24px rgba(15,23,42,0.07);
  padding:12px 0;
  border-bottom:1px solid var(--border);
}
.nav-inner{ display:flex; align-items:center; justify-content:space-between; }
.nav-brand{ display:flex; align-items:center; gap:12px; }
.nav-brand img{ height:46px; width:46px; object-fit:cover; border-radius:12px; box-shadow:var(--shadow-sm); }
.nav-brand-text{ display:flex; flex-direction:column; line-height:1.15; }
.nav-brand-text .name{ font-family:'Sora',sans-serif; font-weight:700; font-size:1.18rem; color:var(--navy); }
.nav-brand-text .sub{ font-size:0.66rem; letter-spacing:0.08em; color:var(--slate-light); font-weight:500; text-transform:uppercase; }

.nav-links{ display:flex; align-items:center; gap:34px; }
.nav-links a{
  font-size:0.92rem; font-weight:500; color:var(--navy-soft);
  position:relative; padding:4px 0; transition:color .3s;
}
.nav-links a::after{
  content:''; position:absolute; left:0; bottom:-3px; width:0; height:2px;
  background:var(--cyan); transition:width .35s var(--ease);
}
.nav-links a:hover, .nav-links a.active{ color:var(--navy); }
.nav-links a:hover::after, .nav-links a.active::after{ width:100%; }

.nav-cta{ display:flex; align-items:center; gap:18px; }
.nav-cta .btn{ padding:11px 22px; font-size:0.88rem; }
.burger{ display:none; flex-direction:column; gap:5px; width:26px; z-index:1100; }
.burger span{ height:2px; background:var(--navy); border-radius:2px; transition:all .35s var(--ease); width:100%; }
.burger.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
.burger.open span:nth-child(2){ opacity:0; }
.burger.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

.mobile-menu{
  position:fixed; inset:0; background:rgba(248,250,252,0.98); backdrop-filter:blur(20px);
  z-index:1050; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:30px;
  opacity:0; visibility:hidden; transition:opacity .4s var(--ease), visibility .4s;
}
.mobile-menu.open{ opacity:1; visibility:visible; }
.mobile-menu a{ font-family:'Sora',sans-serif; font-size:1.5rem; font-weight:600; color:var(--navy); }
.mobile-menu a:hover{ color:var(--cyan); }

/* ============ HERO ============ */
.hero{
  position:relative; min-height:100vh; display:flex; align-items:center;
  padding-top:120px; padding-bottom:60px; overflow:hidden;
  background:
    radial-gradient(circle at 15% 20%, rgba(6,182,212,0.10), transparent 40%),
    radial-gradient(circle at 85% 75%, rgba(15,23,42,0.07), transparent 45%),
    var(--white);
}
.dot-grid{
  position:absolute; inset:0; z-index:0; opacity:0.55;
  background-image: radial-gradient(circle, rgba(15,23,42,0.13) 1px, transparent 1px);
  background-size: 26px 26px;
  mask-image: radial-gradient(ellipse 70% 60% at 60% 35%, black 10%, transparent 75%);
}
.hero-grid{
  display:grid; grid-template-columns:1.15fr 0.85fr; gap:50px; align-items:center;
  position:relative; z-index:2;
}
.hero-content .eyebrow{ margin-bottom:22px; }
.hero h1{
  font-size:clamp(2.6rem,6.2vw,4.6rem); font-weight:800; letter-spacing:-0.02em;
}
.hero h1 .line2{ display:block; }
.hero h1 .gradient-text{
  background:linear-gradient(100deg, var(--navy) 10%, var(--cyan) 55%, var(--cyan-light) 90%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
}
.hero-meta{ margin-top:22px; font-size:1.08rem; color:var(--slate); font-weight:500; line-height:1.6; max-width:480px; }
.hero-meta strong{ color:var(--navy); }
.hero-tagline{
  margin-top:26px; display:inline-flex; flex-wrap:wrap; gap:10px 0;
  font-family:'JetBrains Mono',monospace; font-size:0.85rem; color:var(--navy-soft);
  font-weight:500;
}
.hero-tagline span{ display:inline-flex; align-items:center; }
.hero-tagline .dot{ color:var(--cyan); margin:0 10px; font-weight:700; }
.hero-actions{ display:flex; gap:16px; margin-top:40px; flex-wrap:wrap; }

.hero-visual{ position:relative; height:440px; }
.chart-card{
  position:absolute; inset:0; border-radius:24px; padding:26px 22px 18px;
  display:flex; flex-direction:column;
}
.chart-card .ch-top{ display:flex; justify-content:space-between; align-items:flex-start; }
.chart-card .ch-label{ font-family:'JetBrains Mono',monospace; font-size:0.72rem; color:var(--slate-light); letter-spacing:0.05em; text-transform:uppercase;}
.chart-card .ch-value{ font-family:'Sora',sans-serif; font-size:1.7rem; font-weight:700; color:var(--navy); margin-top:4px;}
.chart-card .ch-value .up{ color:var(--cyan); font-size:0.95rem; font-family:'JetBrains Mono',monospace; font-weight:600; margin-left:6px;}
.chart-svg{ flex:1; width:100%; margin-top:10px; }
.chart-path{ stroke-dasharray:600; stroke-dashoffset:600; animation:draw 2.2s var(--ease) forwards .4s; }
@keyframes draw{ to{ stroke-dashoffset:0; } }
.chart-fill{ opacity:0; animation:fadein 1.4s ease forwards 1.6s; }
@keyframes fadein{ to{opacity:1;} }
.chart-dot{ opacity:0; transform:scale(0); transform-box:fill-box; transform-origin:center; animation:popdot .5s var(--ease) forwards; }
@keyframes popdot{ to{opacity:1; transform:scale(1);} }

.float-chip{
  position:absolute; padding:12px 18px; border-radius:14px;
  display:flex; align-items:center; gap:10px;
  font-family:'JetBrains Mono',monospace; font-size:0.8rem; font-weight:500;
  animation:float 6s ease-in-out infinite;
}
.float-chip i{ color:var(--cyan); font-size:0.95rem;}
.float-chip.c1{ top:-14px; right:-10px; animation-delay:0s;}
.float-chip.c2{ bottom:10px; left:-30px; animation-delay:1.6s;}
@keyframes float{ 0%,100%{transform:translateY(0);} 50%{transform:translateY(-14px);} }

.scroll-cue{
  position:absolute; bottom:26px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:8px;
  font-family:'JetBrains Mono',monospace; font-size:0.68rem; color:var(--slate-light); letter-spacing:0.1em;
  z-index:2;
}
.scroll-cue .bar{ width:1px; height:34px; background:linear-gradient(var(--cyan), transparent); position:relative; overflow:hidden;}
.scroll-cue .bar::after{ content:''; position:absolute; top:0; left:0; width:100%; height:10px; background:var(--cyan); animation:scrolldown 1.8s ease-in-out infinite;}
@keyframes scrolldown{ 0%{transform:translateY(-10px);} 100%{transform:translateY(34px);} }

/* ============ TICKER ============ */
.ticker-wrap{
  background:var(--navy); padding:18px 0; overflow:hidden; position:relative;
  border-top:1px solid rgba(255,255,255,0.07); border-bottom:1px solid rgba(255,255,255,0.07);
}
.ticker-track{ display:flex; width:max-content; animation:ticker 32s linear infinite; }
.ticker-track span{
  font-family:'JetBrains Mono',monospace; color:rgba(255,255,255,0.85); font-size:0.85rem;
  font-weight:500; padding:0 28px; display:flex; align-items:center; gap:28px; white-space:nowrap;
}
.ticker-track span i{ color:var(--cyan); font-size:0.55rem; }
@keyframes ticker{ from{transform:translateX(0);} to{transform:translateX(-50%);} }

/* ============ ABOUT ============ */
.about-grid{ display:grid; grid-template-columns:1fr 1fr; gap:70px; align-items:center; }
.about-copy .eyebrow{ margin-bottom:16px; }
.about-copy h2{ font-size:clamp(1.9rem,4vw,2.6rem); font-weight:700; margin-bottom:20px; letter-spacing:-0.01em;}
.about-copy p{ color:var(--slate); font-size:1.04rem; line-height:1.8; margin-bottom:18px; }
.about-points{ margin-top:26px; display:flex; flex-direction:column; gap:14px; }
.about-points li{ display:flex; gap:12px; align-items:flex-start; font-size:0.97rem; color:var(--navy-soft); font-weight:500;}
.about-points i{ color:var(--cyan); margin-top:3px; }

.stat-grid{ display:grid; grid-template-columns:1fr 1fr; gap:18px; }
.stat-card{ padding:30px 24px; transition:transform .4s var(--ease), box-shadow .4s var(--ease); }
.stat-card:hover{ transform:translateY(-6px); box-shadow:var(--shadow-lg); }
.stat-card .stat-num{
  font-family:'JetBrains Mono',monospace; font-size:2.3rem; font-weight:600; color:var(--navy);
  display:flex; align-items:baseline; gap:4px;
}
.stat-card .stat-num .suffix{ color:var(--cyan); font-size:1.4rem; }
.stat-card .stat-label{ margin-top:8px; font-size:0.85rem; color:var(--slate); font-weight:500; }
.stat-card i.bg-icon{ position:absolute; right:18px; top:18px; font-size:1.3rem; color:var(--cyan-dim); }
.stat-card{ position:relative; overflow:hidden; }

/* ============ TEAM ============ */
.leadership-row{
  display:grid; grid-template-columns:repeat(5,1fr); gap:20px; margin-bottom:60px;
}
.team-card{
  padding:30px 20px 26px; text-align:center; transition:transform .45s var(--ease), box-shadow .45s var(--ease), border-color .45s;
  position:relative;
}
.team-card:hover{ transform:translateY(-10px); box-shadow:var(--shadow-lg); border-color:rgba(6,182,212,0.35); }
.avatar{
  width:74px; height:74px; border-radius:50%; margin:0 auto 16px;
  display:flex; align-items:center; justify-content:center;
  font-family:'Sora',sans-serif; font-weight:700; font-size:1.3rem; color:var(--white);
  background:linear-gradient(135deg, var(--navy), var(--cyan));
  transition:transform .45s var(--ease);
  box-shadow:0 8px 20px rgba(15,23,42,0.18);
}
.team-card:hover .avatar{ transform:scale(1.08) rotate(-4deg); }
.leadership-row .avatar{ width:88px; height:88px; font-size:1.5rem; }
.team-card .t-name{ font-family:'Sora',sans-serif; font-weight:700; font-size:1.02rem; color:var(--navy); }
.team-card .t-role{
  margin-top:6px; font-family:'JetBrains Mono',monospace; font-size:0.7rem; letter-spacing:0.05em;
  text-transform:uppercase; color:var(--cyan); font-weight:600;
}
.leadership-row .t-name{ font-size:1.12rem; }

.team-grid-title{ font-family:'JetBrains Mono',monospace; font-size:0.78rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--slate-light); margin:50px 0 22px; display:flex; align-items:center; gap:14px;}
.team-grid-title::after{ content:''; flex:1; height:1px; background:var(--border-strong); }
.team-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }

/* ============ DEPARTMENTS ============ */
.dept-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:22px; }
.dept-card{
  padding:32px 26px; transition:transform .45s var(--ease), box-shadow .45s var(--ease), background .45s;
  position:relative; overflow:hidden;
}
.dept-card::before{
  content:''; position:absolute; top:-40%; right:-40%; width:140px; height:140px; border-radius:50%;
  background:radial-gradient(circle, rgba(6,182,212,0.18), transparent 70%); transition:transform .5s var(--ease);
}
.dept-card:hover{ transform:translateY(-8px); box-shadow:var(--shadow-lg); }
.dept-card:hover::before{ transform:scale(1.6); }
.dept-icon{
  width:52px; height:52px; border-radius:14px; background:var(--navy); color:var(--white);
  display:flex; align-items:center; justify-content:center; font-size:1.25rem; margin-bottom:20px;
  transition:background .4s, transform .4s var(--ease);
}
.dept-card:hover .dept-icon{ background:var(--cyan); transform:rotate(-8deg) scale(1.05); }
.dept-card h4{ font-size:1.08rem; font-weight:700; margin-bottom:8px; }
.dept-card p{ color:var(--slate); font-size:0.9rem; line-height:1.65; }

/* ============ EVENTS ============ */
.events-list{ display:flex; flex-direction:column; gap:0; }
.event-row{
  display:grid; grid-template-columns:90px 1fr auto; align-items:center; gap:28px;
  padding:32px 10px; border-bottom:1px solid var(--border);
  transition:padding-left .4s var(--ease), background .4s;
}
.event-row:hover{ padding-left:22px; background:var(--off-white); }
.event-row:first-child{ border-top:1px solid var(--border); }
.event-num{ font-family:'JetBrains Mono',monospace; font-size:0.95rem; color:var(--cyan); font-weight:600; }
.event-info h3{ font-size:1.35rem; font-weight:700; margin-bottom:6px; }
.event-info p{ color:var(--slate); font-size:0.95rem; max-width:560px; line-height:1.6;}
.event-arrow{
  width:46px; height:46px; border-radius:50%; border:1.5px solid var(--border-strong);
  display:flex; align-items:center; justify-content:center; color:var(--navy);
  transition:all .4s var(--ease);
}
.event-row:hover .event-arrow{ background:var(--cyan); border-color:var(--cyan); color:var(--white); transform:rotate(45deg); }

/* ============ GALLERY ============ */
.gallery-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:18px; }
.gallery-grid .g-item:nth-child(1){ grid-row:span 2; }
.gallery-grid .g-item:nth-child(6){ grid-row:span 2; }
.g-item{
  position:relative; border-radius:18px; overflow:hidden; min-height:170px;
  display:flex; align-items:center; justify-content:center;
  background:linear-gradient(145deg, var(--navy) 0%, var(--navy-2) 55%, var(--cyan) 150%);
  cursor:pointer;
}
.g-item:nth-child(2n){ background:linear-gradient(145deg, var(--navy-2) 0%, var(--cyan) 130%); }
.g-item:nth-child(3n){ background:linear-gradient(160deg, #0F172A 0%, #155E75 80%); }
.g-item i{ font-size:1.8rem; color:rgba(255,255,255,0.55); transition:transform .5s var(--ease); }
.g-overlay{
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end;
  padding:18px; background:linear-gradient(to top, rgba(15,23,42,0.75), transparent 60%);
  opacity:0; transition:opacity .4s var(--ease);
}
.g-item:hover .g-overlay{ opacity:1; }
.g-item:hover i{ transform:scale(1.15); }
.g-overlay span{ color:var(--white); font-family:'Sora',sans-serif; font-weight:600; font-size:0.92rem; }
.g-overlay small{ color:rgba(255,255,255,0.7); font-family:'JetBrains Mono',monospace; font-size:0.68rem; letter-spacing:0.05em; margin-top:3px;}

/* ============ CONTACT ============ */
.contact-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:22px; }
.contact-card{
  padding:38px 28px; text-align:left; transition:transform .4s var(--ease), box-shadow .4s var(--ease);
  display:flex; flex-direction:column; gap:18px;
}
.contact-card:hover{ transform:translateY(-8px); box-shadow:var(--shadow-lg); }
.contact-icon{
  width:54px; height:54px; border-radius:50%; background:var(--cyan-dim); color:var(--cyan);
  display:flex; align-items:center; justify-content:center; font-size:1.3rem;
}
.contact-card h4{ font-size:1.1rem; font-weight:700; }
.contact-card a.handle{ color:var(--slate); font-size:0.92rem; word-break:break-word; }
.contact-card .go{ font-family:'JetBrains Mono',monospace; font-size:0.78rem; color:var(--cyan); font-weight:600; display:inline-flex; gap:6px; align-items:center; margin-top:auto;}
.contact-card .go i{ transition:transform .35s var(--ease); }
.contact-card:hover .go i{ transform:translateX(5px); }

/* ============ FOOTER ============ */
footer{ background:var(--navy); color:rgba(255,255,255,0.85); padding-top:80px; position:relative; overflow:hidden;}
footer::before{
  content:''; position:absolute; top:-50%; right:-10%; width:500px; height:500px; border-radius:50%;
  background:radial-gradient(circle, rgba(6,182,212,0.18), transparent 70%);
}
.footer-grid{ display:grid; grid-template-columns:1.4fr 1fr 1fr 1fr; gap:50px; position:relative; z-index:2; }
.footer-brand{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.footer-brand .name{ font-family:'Sora',sans-serif; font-weight:700; font-size:1.3rem; color:var(--white); }
.footer-col h5{ font-family:'JetBrains Mono',monospace; font-size:0.75rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--cyan-light); margin-bottom:18px; }
.footer-col p, .footer-col li{ font-size:0.9rem; color:rgba(255,255,255,0.65); margin-bottom:10px; line-height:1.6;}
.footer-col a:hover{ color:var(--cyan-light); }
.footer-col ul li a{ transition:color .3s; }
.footer-social{ display:flex; gap:12px; margin-top:6px; }
.footer-social a{
  width:38px; height:38
